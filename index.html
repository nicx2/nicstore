        function render(list) {
            currentList = list;
            var grid = document.getElementById('combos');
            var html = '';
            for (var i = 0; i < list.length; i++) {
                var c = list[i];
                var imgHtml = '';
                if (c.isElite && Array.isArray(c.img)) {
                    var imgs = '';
                    for (var j = 0; j < c.img.length; j++) { imgs += '<img src="' + c.img[j] + '">'; }
                    imgHtml = '<div class="grid-capas">' + imgs + '</div>';
                } else {
                    imgHtml = '<img src="' + c.img + '" class="img-square">';
                }
                var badgeHtml = c.badge ? '<span class="badge">' + c.badge + '</span>' : '';
                html += '<div class="card-game" onclick="openMod(' + i + ')">' + badgeHtml + '<div class="img-container">' + imgHtml + '</div><div class="p-4 flex-grow flex flex-col justify-end text-left"><h4 class="text-[8px] font-bold text-gray-400 uppercase truncate mb-1 text-left">' + c.name + '</h4><span class="text-sm font-black italic text-left text-white">R$ ' + c.price + '</span></div></div>';
            }
            grid.innerHTML = html;
        }

        function openMod(index) {
            selecionado = currentList[index];

            btn.innerText = "Pagar via Pix";

            document.getElementById('modal-price').innerText = "R$ " + selecionado.price;
            document.getElementById('modal-list').innerText = selecionado.games;

                for(var j=0; j<selecionado.img.length; j++) { imgs += '<img src="' + selecionado.img[j] + '" class="w-full h-full object-cover">'; }

            } else {

            }

        function handlePurchase() {
            var email = document.getElementById('cEmail').value;
            var whatsapp = document.getElementById('cWhatsapp').value;
            
            if(!email.includes('@')) { alert('E-mail necessário!'); return; }
            if(whatsapp === '') { alert('Digite seu WhatsApp para contato!'); return; }
            
            var btn = document.getElementById('mainBuyBtn');
            
            if (!pixCopiado) {
                var dummy = document.createElement("textarea");
                document.body.appendChild(dummy);
                dummy.value = MINHA_CHAVE_PIX;
                dummy.select();
                document.execCommand("copy");
                document.body.removeChild(dummy);
                
                var toast = document.getElementById('pixToast');
                toast.classList.add('show');
                setTimeout(function(){ toast.classList.remove('show'); }, 2000);
                
                btn.innerText = "JÁ FIZ O PAGAMENTO ✅"; 
                btn.style.backgroundColor = "#00ff88";
                pixCopiado = true;
            } else {
                var msg = "Fala Nicolas! Quero comprar:\n\n🎮 *" + selecionado.name + "*\n💰 R$ " + selecionado.price + "\n📧 E-mail: " + email + "\n📱 WhatsApp: " + whatsapp;

            }
        }

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }

            var f = combos.filter(function(c) { return c.name.toLowerCase().includes(e.target.value.toLowerCase()); });
