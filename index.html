        function render(list) {
            const grid = document.getElementById('combos'); grid.innerHTML = '';
            list.forEach(c => {
                let img = c.isElite ? `<div class="grid-capas">${c.img.map(u => `<img src="${u}">`).join('')}</div>` : `<img src="${c.img}" class="img-square" onerror="this.src='https://via.placeholder.com/600x900?text=NICSTORE'">`;
                let badge = c.badge ? `<span class="badge">${c.badge}</span>` : '';
                grid.innerHTML += `<div class="card-game" onclick="openMod('${c.name}')">${badge}<div class="img-container">${img}</div><div class="p-4 flex-grow flex flex-col justify-end text-left"><h4 class="text-[8px] font-bold text-gray-500 uppercase truncate mb-1 text-left">${c.name}</h4><span class="text-sm font-black italic text-left text-white">R$ ${c.price}</span></div></div>`;
            });
        }

            selecionado = combos.find(x => x.name === name);
            document.getElementById('modal-title').innerText = selecionado.name;
            document.getElementById('modal-price').innerText = "R$ " + selecionado.price;
            document.getElementById('modal-list').innerText = selecionado.games;

        }

            const dummy = document.createElement("textarea"); document.body.appendChild(dummy);
            dummy.value = MINHA_CHAVE_PIX; dummy.select(); document.execCommand("copy"); document.body.removeChild(dummy);

            window.open(`https://wa.me/5577999451274?text=${encodeURIComponent("Olá! Paguei R$ "+selecionado.price+" pelo "+selecionado.name+". E-mail: "+email)}`);
        };

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }
        document.getElementById('mainSearch').oninput = (e) => { const f = combos.filter(c => c.name.toLowerCase().includes(e.target.value.toLowerCase())); render(f); };

            const h = new Date().getHours(); const dot = document.getElementById('statusDot');
