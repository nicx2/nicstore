        .img-container { width: 100%; aspect-ratio: 10/14; overflow: hidden; background: #000; position: relative; }
        .img-square { width: 100%; height: 100%; object-fit: cover; }
        .grid-capas { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 100%; gap: 1px; background: #000; }
        .grid-capas img { width: 100%; height: 100%; object-fit: cover; }

        function render(list) {
            currentList = list;
            var grid = document.getElementById('combos');
            grid.innerHTML = '';
            for (var i = 0; i < list.length; i++) {
                var c = list[i];
                var imgHtml = '';
                if (c.isElite && Array.isArray(c.img)) {
                    var imgs = '';
                    for (var j = 0; j < c.img.length; j++) { imgs += '<img src="' + c.img[j] + '">'; }
                    imgHtml = '<div class="grid-capas">' + imgs + '</div>';
                } else {
                    imgHtml = '<img src="' + c.img + '" class="img-square">';
                }
                var badgeHtml = c.badge ? '<span class="badge">' + c.badge + '</span>' : '';
                grid.innerHTML += '<div class="card-game" data-id="' + i + '" onclick="openMod(this.getAttribute(\'data-id\'))">' + badgeHtml + '<div class="img-container">' + imgHtml + '</div><div class="p-4 flex-grow flex flex-col justify-end text-left"><h4 class="text-[8px] font-bold text-gray-400 uppercase truncate mb-1 text-left">' + c.name + '</h4><span class="text-sm font-black italic text-left text-white">R$ ' + c.price + '</span></div></div>';
            }
        }

        function openMod(id) {
            selecionado = currentList[id];
            
            document.getElementById('modal-title').innerText = selecionado.name;
            document.getElementById('modal-list').innerHTML = selecionado.games;
            
            var precoCalculo = parseFloat(selecionado.price.replace(',', '.'));
            var precoFalso = (precoCalculo + 30.00).toFixed(2).replace('.', ',');
            document.getElementById('modal-fake-price').innerText = "De R$ " + precoFalso;
            document.getElementById('modal-price').innerText = "R$ " + selecionado.price;
            
            if (selecionado.isElite && Array.isArray(selecionado.img)) {
                var imgs = '';
                for(var j=0; j<selecionado.img.length; j++) { imgs += '<img src="' + selecionado.img[j] + '" class="w-full h-full object-cover">'; }
                document.getElementById('modal-header-img').innerHTML = '<div class="grid-capas h-full">' + imgs + '</div>';
            } else {
                document.getElementById('modal-header-img').innerHTML = '<img src="' + selecionado.img + '" class="w-full h-full object-cover">';
            }
            
            document.getElementById('gameModal').style.display = 'flex';
        }

        function handlePurchase() {
            var email = document.getElementById('cEmail').value;
            if(email === '') { alert('Digite seu e-mail para entrega!'); return; }
            
            var msg = "Fala Nicolas! Quero comprar:\n\n🎮 *" + selecionado.name + "*\n💰 R$ " + selecionado.price + "\n📧 E-mail: " + email;
            window.open("https://wa.me/5577999451274?text=" + encodeURIComponent(msg));
        }

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }
        
        document.getElementById('mainSearch').oninput = function(e) { 
            var busca = e.target.value.toLowerCase();
            var filtrados = combos.filter(function(c) { 
                return c.name.toLowerCase().includes(busca) || c.games.toLowerCase().includes(busca); 
            }); 
            render(filtrados); 
        };

        window.onload = function() {
            render(combos);
            
            var tempo = 600;
            setInterval(function() {
                var min = Math.floor(tempo / 60);
                var sec = tempo % 60;
                var secFormatado = sec < 10 ? '0' + sec : sec;
                document.getElementById('timerText').innerText = "⏳ Oferta expira em " + min + ":" + secFormatado;
                if(tempo > 0) tempo--;
            }, 1000);
        };
    </script>
