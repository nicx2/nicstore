<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICSTORE | Catálogo Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'gamer-bg': '#02040a', 'gamer-card': '#0d111a', 'gamer-blue': '#00a2ff', 'gamer-green': '#00ff88' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background-color: #02040a; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 15px; max-width: 900px; margin: 0 auto; }
        .card-game { background: #0d111a; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; transition: 0.3s; height: 100%; display: flex; flex-direction: column; position: relative; }
        .card-game:active { transform: scale(0.96); border-color: #00a2ff; }
        .img-container { width: 100%; aspect-ratio: 10/14; overflow: hidden; background: #000; position: relative; }
        .img-square { width: 100%; height: 100%; object-fit: cover; }
        .grid-capas { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 100%; gap: 1px; background: #000; }
        .grid-capas img { width: 100%; height: 100%; object-fit: cover; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; padding: 15px; backdrop-filter: blur(15px); justify-content: center; align-items: center; overflow-y: auto; }
        .badge { position: absolute; top: 10px; left: 10px; padding: 3px 8px; border-radius: 6px; font-size: 7px; font-weight: 900; text-transform: uppercase; z-index: 10; background: #00a2ff; color: #000; box-shadow: 0 0 10px rgba(0,162,255,0.4); }
        #pixToast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #00a2ff; color: black; padding: 12px 24px; border-radius: 50px; font-weight: 800; font-size: 11px; z-index: 1000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,162,255,0.4); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        #pixToast.show { top: 30px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #00a2ff; border-radius: 10px; }
    </style>
</head>
<body class="antialiased text-left">

    <div id="pixToast"><span>✅ PIX COPIADO COM SUCESSO!</span></div>

    <nav class="sticky top-0 z-40 bg-gamer-bg/80 backdrop-blur-md border-b border-white/5 p-4 flex justify-between items-center px-6">
        <div class="text-left">
            <h1 class="text-2xl font-black text-white italic uppercase tracking-tighter leading-none">NIC<span class="text-gamer-blue">STORE</span></h1>
            <div class="flex items-center text-[8px] font-bold uppercase tracking-widest text-gray-400 mt-1">
                <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span> <span>On-line</span>
            </div>
        </div>
        <a href="https://wa.me/5577999451274" class="bg-gamer-blue text-black px-5 py-2 rounded-full font-bold text-[10px] uppercase shadow-[0_0_15px_rgba(0,162,255,0.4)]">Suporte</a>
    </nav>

    <header class="p-10 text-left">
        <h2 class="text-5xl font-black mb-8 uppercase italic tracking-tighter leading-none">CATÁLOGO <span class="text-gamer-blue text-transparent bg-clip-text bg-gradient-to-r from-gamer-blue to-purple-500">GAMES</span></h2>
        <input type="text" id="mainSearch" placeholder="O que você quer jogar?" class="w-full bg-gamer-card border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:border-gamer-blue text-sm transition shadow-2xl">
    </header>

    <section id="combos" class="game-grid pb-32"></section>

    <div id="gameModal" class="modal" onclick="closeModal()">
        <div class="bg-gamer-card w-full max-w-md rounded-[32px] border border-white/10 relative p-8 shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-white/50 text-3xl font-light">&times;</button>
            <div id="modal-header-img" class="w-full h-48 rounded-2xl overflow-hidden mb-6 border border-white/5"></div>
            <h3 id="modal-title" class="text-2xl font-black text-gamer-blue mb-2 uppercase italic tracking-tighter text-left"></h3>
            <div class="bg-white/5 p-4 rounded-2xl mb-4 flex justify-between items-center">
                <span id="modal-price" class="text-3xl font-black text-white tracking-tighter"></span>
                <span class="text-gamer-blue text-[10px] font-bold uppercase tracking-widest leading-none">Via Pix</span>
            </div>
            <div id="modal-list" class="text-[11px] text-gray-400 leading-relaxed max-h-48 overflow-y-auto custom-scroll pr-2 whitespace-pre-wrap border-t border-white/5 pt-3 mb-4 text-left"></div>
            <input type="email" id="cEmail" placeholder="Seu e-mail para entrega" class="w-full bg-black border border-white/10 rounded-2xl px-5 py-4 text-xs mb-4 outline-none focus:border-gamer-blue text-white">
            <button id="mainBuyBtn" onclick="handlePurchase()" class="w-full bg-gamer-blue text-black py-4 rounded-2xl font-black uppercase text-xs transition-all duration-300">
                Pagar via Pix
            </button>
        </div>
    </div>

    <script>
        const MINHA_CHAVE_PIX = "00020101021126360014br.gov.bcb.pix0114+55779994512745204000053039865802BR5918NICOLAS N PINHEIRO6013VITORIA DA CO62070503***63049DCD";
        let selecionado = {};
        let pixCopiado = false;

        const combos = [
            // SUPER CONTA
            { 
                name: "CONTA GAMER 200+ JOGOS", price: "89,90", isElite: true, badge: "🔥 TOP 1", 
                img: ["https://i.postimg.cc/wM0thWBT/e2c6c38a-36ab-4acc-88ff-6f4a47e6acd9.jpg", "https://i.postimg.cc/CKTKfy4J/20d7ce3b-0abd-4dd3-b433-51c013da4865.jpg", "https://i.postimg.cc/rynFNRJ8/d2a78031-cad2-4ab7-919e-f5a6ba554451.jpg", "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1817070/library_600x900_2x.jpg"], 
                games: "TODOS OS JOGOS SONY + DARK SOULS + RE REMAKES + HOGWARTS LEGACY + SPIDER-MAN + GOD OF WAR RAGNAROK E MUITO MAIS!" 
            },
            // NOVOS PACKS R$ 39,90
            { name: "PACK SONY", price: "39,90", img: "https://i.postimg.cc/rynFNRJ8/d2a78031-cad2-4ab7-919e-f5a6ba554451.jpg", games: "TLOU I & II, Spider-Man, Ghost of Tsushima, God of War Ragnarok, Horizon Forbidden West, Uncharted, Days Gone, Detroit." },
            { name: "PACK RESIDENT EVIL", price: "39,90", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2050650/library_600x900_2x.jpg", games: "RE 0, RE 1, Revelations 1/2, RE 2, 3, 4 Remakes, RE 5, 6, 7 e Village + DLCs." },
            { name: "PACK CALL OF DUTY", price: "39,90", img: "https://i.postimg.cc/G2BLVC4t/images-(15).jpg", games: "Saga COD Completa do clássico ao MW Remastered." },
            { name: "PACK DARK SOULS", price: "39,90", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1245620/library_600x900_2x.jpg", games: "DS I, II, III + Elden Ring + DLC Shadow of Erdtree." },
            { name: "PACK TERROR", price: "39,90", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2358720/library_600x900_2x.jpg", games: "Outlast, Alien, Dead Space, The Quarry, Visage." },
            { name: "PACK ANIME", price: "39,90", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1490890/library_600x900_2x.jpg", games: "Naruto, Demon Slayer, Jujutsu Kaisen, JoJo's." },
            { name: "PACK SOBREVIVÊNCIA", price: "39,90", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1623730/library_600x900_2x.jpg", games: "ARK, Palworld, No Man's Sky, Valheim." },
            { name: "PACK SIMULATOR", price: "39,90", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2670630/library_600x900_2x.jpg", games: "Euro Truck, Supermarket Sim, Contraband, Raft." },
            // COMBOS ANTIGOS (Links atualizados)
            { name: "Resident Evil 9 Requiem", price: "59,90", badge: "Novo", img: "https://i.postimg.cc/wM0thWBT/e2c6c38a-36ab-4acc-88ff-6f4a47e6acd9.jpg", games: "Resident Evil Requiem - Lançamento Oficial." },
            { name: "Combo The Last of Us", price: "30,00", img: "https://i.postimg.cc/CKTKfy4J/20d7ce3b-0abd-4dd3-b433-51c013da4865.jpg", games: "The Last of Us Part I & II Remastered." },
            { name: "Combo God of War", price: "25,00", img: "https://i.postimg.cc/rynFNRJ8/d2a78031-cad2-4ab7-919e-f5a6ba554451.jpg", games: "GoW Ragnarok + GoW (2018)." },
            { name: "Resident Evil Ultimate", price: "26,90", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2050650/library_600x900_2x.jpg", games: "Saga RE Remake: 2, 3, 4, Village e 7." },
            { name: "Ghost + MH Rise", price: "28,00", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2215430/library_600x900_2x.jpg", games: "Ghost of Tsushima + Monster Hunter Rise." },
            { name: "Forza Horizon 5 + 4 Premium", price: "26,00", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1551360/library_600x900_2x.jpg", games: "Forza Horizon 5 & 4 Premium." },
            { name: "EA FC 26 + F1", price: "20,00", img: "https://i.postimg.cc/G2BLVC4t/images-(15).jpg", games: "EA FC 2026 + F1 2026 Sports." },
            { name: "Silent Hill 2 REMAKE", price: "13,00", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2124490/library_600x900_2x.jpg", games: "Silent Hill 2 Remake Oficial." },
            { name: "Combo LEGO Master", price: "13,00", badge: "PROMO", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/21000/library_600x900_2x.jpg", games: "Saga completa LEGO (16 Jogos)." }
        ];

        function render(list) {
            const grid = document.getElementById('combos'); grid.innerHTML = '';
            list.forEach(c => {
                let img = c.isElite ? `<div class="grid-capas">${c.img.map(u => `<img src="${u}">`).join('')}</div>` : `<img src="${c.img}" class="img-square">`;
                grid.innerHTML += `<div class="card-game" onclick="openMod('${c.name}')">${c.badge ? `<span class="badge">${c.badge}</span>`:''}<div class="img-container">${img}</div><div class="p-4 flex-grow flex flex-col justify-end text-left"><h4 class="text-[8px] font-bold text-gray-400 uppercase truncate mb-1 text-left">${c.name}</h4><span class="text-sm font-black italic text-left text-white">R$ ${c.price}</span></div></div>`;
            });
        }

        function openMod(name) {
            selecionado = combos.find(x => x.name === name);
            pixCopiado = false;
            const btn = document.getElementById('mainBuyBtn');
            btn.innerText = "Pagar via Pix";
            btn.style.backgroundColor = "#00a2ff";
            document.getElementById('modal-title').innerText = selecionado.name;
            document.getElementById('modal-price').innerText = "R$ " + selecionado.price;
            document.getElementById('modal-list').innerText = selecionado.games;
            document.getElementById('modal-header-img').innerHTML = selecionado.isElite ? `<div class="grid-capas h-full">${selecionado.img.map(u => `<img src="${u}" class="w-full h-full object-cover">`).join('')}</div>` : `<img src="${selecionado.img}" class="w-full h-full object-cover">`;
            document.getElementById('gameModal').style.display = 'flex';
        }

        function handlePurchase() {
            const email = document.getElementById('cEmail').value;
            if(!email.includes('@')) { alert('E-mail necessário!'); return; }
            const btn = document.getElementById('mainBuyBtn');
            if (!pixCopiado) {
                const dummy = document.createElement("textarea"); document.body.appendChild(dummy);
                dummy.value = MINHA_CHAVE_PIX; dummy.select(); document.execCommand("copy"); document.body.removeChild(dummy);
                const toast = document.getElementById('pixToast'); toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
                btn.innerText = "JÁ FIZ O PAGAMENTO ✅"; btn.style.backgroundColor = "#00ff88";
                pixCopiado = true;
            } else {
                window.open(`https://wa.me/5577999451274?text=${encodeURIComponent("Olá Nicolas! Já fiz o pagamento de R$ "+selecionado.price+" pelo "+selecionado.name+". E-mail: "+email)}`);
            }
        }

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }
        document.getElementById('mainSearch').oninput = (e) => { const f = combos.filter(c => c.name.toLowerCase().includes(e.target.value.toLowerCase())); render(f); };
        render(combos);
    </script>
</body>
</html>
