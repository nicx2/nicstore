        function render(items) {
            const grid = document.getElementById('combos'); grid.innerHTML = '';
            items.forEach(c => {
                let img = c.e ? `<div class="grid-capas">${c.i.map(u => `<img src="${u}">`).join('')}</div>` : `<img src="${c.i}" onerror="this.src='https://via.placeholder.com/600x900?text=NICSTORE'">`;
                grid.innerHTML += `<div class="card" onclick="openMod('${c.n}')"><div class="img-box">${img}</div><div class="p-3 text-left"><p class="text-[8px] text-gray-400 uppercase font-bold truncate">${c.n}</p><p class="text-sm font-black italic">R$ ${c.p}</p></div></div>`;
            });
        }

        function openMod(name) {
            current = data.find(x => x.n === name);
            document.getElementById('m-title').innerText = current.n;
            document.getElementById('m-price').innerText = "R$ " + current.p;
            document.getElementById('m-list').innerText = "O QUE VEM NO COMBO:\n" + current.d;
            document.getElementById('m-img').innerHTML = current.e ? `<div class="grid-capas h-full">${current.i.map(u => `<img src="${u}" class="w-full h-full object-cover">`).join('')}</div>` : `<img src="${current.i}" class="w-full h-full object-cover">`;
            document.getElementById('gameModal').style.display = 'flex';
        }

            const mail = document.getElementById('cEmail').value;
            if(!mail || !mail.includes('@')) { alert('Por favor, digite seu e-mail!'); return; }
            
            // COPIAR PIX AUTOMÁTICO
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = PIX;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            
            alert('Chave Pix copiada! ✅\nConfirmando no WhatsApp...');
