        function render(list) {
            const grid = document.getElementById('combos'); grid.innerHTML = '';
            list.forEach((c, index) => {
                let img = c.isElite ? `<div class="grid-capas">${c.img.map(u => `<img src="${u}">`).join('')}</div>` : `<img src="${c.img}" class="img-square">`;
                let badge = c.badge ? `<span class="badge">${c.badge}</span>` : '';
                grid.innerHTML += `<div class="card-game" onclick="openMod('${c.name}')">${badge}<div class="img-container">${img}</div><div class="p-4 text-left flex-grow flex flex-col justify-end"><h4 class="text-[9px] font-bold text-gray-500 uppercase truncate mb-1">${c.name}</h4><span class="text-sm font-black italic">R$ ${c.price}</span></div></div>`;
            });
        }

        function openMod(name) {
            jogoSelecionado = combos.find(x => x.name === name);
            document.getElementById('modal-title').innerText = jogoSelecionado.name;
            document.getElementById('modal-price').innerText = "R$ " + jogoSelecionado.price;
            document.getElementById('modal-list').innerText = jogoSelecionado.games;
            document.getElementById('modal-header-img').innerHTML = jogoSelecionado.isElite ? `<div class="grid-capas h-full">${jogoSelecionado.img.map(u => `<img src="${u}" class="w-full h-full object-cover">`).join('')}</div>` : `<img src="${jogoSelecionado.img}" class="w-full h-full object-cover">`;
            document.getElementById('gameModal').style.display = 'flex';
        }

        document.getElementById('btnComprar').onclick = () => {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(MINHA_CHAVE_PIX)}`;
            document.getElementById('checkoutModal').style.display = 'flex';
        };

        function enviarWhats() {
            const email = document.getElementById('cEmail').value;
            if(!email.includes('@')) { alert('Por favor, digite um e-mail válido!'); return; }
            const msg = `Olá! Paguei R$ ${jogoSelecionado.price} pelo combo: ${jogoSelecionado.name}.\nMeu e-mail: ${email}`;
            window.open(`https://wa.me/5577999451274?text=${encodeURIComponent(msg)}`);
        }

        function copyPix() { navigator.clipboard.writeText(MINHA_CHAVE_PIX); alert("Chave Pix Copiada! ✅"); }
        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }
        function closeCheckout() { document.getElementById('checkoutModal').style.display = 'none'; }
        document.getElementById('mainSearch').oninput = (e) => { const f = combos.filter(c => c.name.toLowerCase().includes(e.target.value.toLowerCase())); render(f); };

        const checkStatus = () => {
            const hour = new Date().getHours(); const dot = document.getElementById('statusDot');
            if (hour >= 13 && hour < 23) { dot.style.backgroundColor = '#00ff88'; document.getElementById('statusText').innerText = 'Suporte On-line'; }
            else { dot.style.backgroundColor = '#ff4444'; document.getElementById('statusText').innerText = 'Aberto das 13h às 23h'; }
        }

        checkStatus(); render(combos);
